apiVersion: v1
kind: Namespace
metadata:
  name: courses
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-platform
  namespace: courses
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-platform-role
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - namespaces
      - deployments
      - replicasets
      - pods
      - services
      - endpoints
      - configmaps
      - secrets
      - jobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-platform-binding
subjects:
  - kind: ServiceAccount
    name: k8s-platform
    namespace: courses
roleRef:
  kind: ClusterRole
  name: k8s-platform-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-platform
  namespace: courses
  labels:
    app: k8s-platform
spec:
  # 1 replica: the default progress store is in-memory and the PTY terminal is
  # stateful per pod. To scale horizontally, set DATABASE_URL (Postgres data
  # tier) and add session-affinity for the terminal WebSocket, then raise this.
  replicas: 1
  selector:
    matchLabels:
      app: k8s-platform
  template:
    metadata:
      labels:
        app: k8s-platform
    spec:
      serviceAccountName: k8s-platform
      containers:
        - name: platform
          # Built locally and loaded into the kind cluster by `make up` / `make build`.
          image: k8s-platform:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-platform
  namespace: courses
spec:
  selector:
    app: k8s-platform
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
  type: NodePort
