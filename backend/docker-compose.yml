# Data tier for local development. Start with: docker compose up -d
# Then run the backend with DATABASE_URL pointing at it (see .env.example).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: k8s
      POSTGRES_PASSWORD: k8s
      POSTGRES_DB: k8s_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k8s -d k8s_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
