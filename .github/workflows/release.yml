# Build the lab "app" image and push it to GitHub Container Registry (GHCR),
# multi-platform (amd64 + arm64) so it runs on Intel/AMD and Apple-Silicon.
#
# The app is the ONLY service we build (k3s, postgres, registry-cache and
# warm-cache all use public images). Publishing this one image is what lets the
# `curl | bash` installer skip the slow local build and just `docker compose up`.
#
# Triggers:
#   - pushing a git tag like  v1.2.3   -> publishes 1.2.3, 1.2 and latest
#   - manual run (Actions tab "Run workflow") -> publishes latest (+ edge)
#
# Image: ghcr.io/<owner>/<repo>  (metadata-action lowercases it for GHCR).
name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write   # publish the klab binaries as GitHub Release assets
  packages: write   # push the app image to GHCR

jobs:
  # Quality gate: reuse ci.yml (go vet + test, frontend typecheck + build).
  # If it fails, the image job below never runs — nothing gets published.
  ci:
    uses: ./.github/workflows/ci.yml

  image:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU (enables arm64 emulation on the amd64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Cross-compile the `klab` CLI and attach the raw binaries to the GitHub
  # Release for this tag. Names are STABLE (no version in them) so the installer
  # and `klab update` can always fetch releases/latest/download/klab_<os>_<arch>.
  klab:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build klab for every platform
        working-directory: cli
        run: |
          mkdir -p dist
          build() {
            GOOS="$1" GOARCH="$2" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/klab_$1_$2$3" .
            echo "built dist/klab_$1_$2$3"
          }
          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 .exe
          build windows arm64 .exe

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist/klab_*
