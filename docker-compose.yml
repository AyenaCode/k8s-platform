# K8s Lab: the whole stack. The ONLY dependency on your machine is Docker.
#
#   docker compose up --build      then open http://localhost:8080
#
# Three services:
#   k3s      a real (lightweight) Kubernetes cluster, in a container
#   postgres progress / XP storage
#   app      the Go backend + React SPA + the learner's interactive terminal
#
# The app shares k3s's network namespace (network_mode: service:k3s) so the
# terminal IS the node: `kubectl`, pod IPs, ClusterIPs and `localhost:<nodePort>`
# all work with zero config. Because of that, the app has no ports of its own,
# its :8080 is published on the k3s service below.

services:
  k3s:
    image: rancher/k3s:v1.36.1-k3s1
    # traefik (Ingress) and metrics-server (HPA / `kubectl top`) are k3s built-ins,
    # left ENABLED so the intermediate Ingress + autoscaling labs work out of the box.
    command: server
    privileged: true
    # Forward external lookups to reliable resolvers. The Docker default forwards
    # to the host resolver, which on a flaky network times out ("lookup
    # registry-1.docker.io: Try again") and leaves pods in ImagePullBackOff.
    # Override with LAB_DNS1/LAB_DNS2 if you are on a VPN / corporate network that
    # only permits an internal resolver. Docker's embedded DNS still resolves the
    # compose service names (e.g. registry-cache), so this only changes upstream.
    dns:
      - ${LAB_DNS1:-1.1.1.1}
      - ${LAB_DNS2:-8.8.8.8}
    # Start the pull-through cache first so the very first image pull can use it.
    depends_on:
      registry-cache:
        condition: service_started
    tmpfs:
      - /run
      - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    environment:
      - K3S_TOKEN=${K3S_TOKEN:-labtoken}
      - K3S_KUBECONFIG_OUTPUT=/kubeconfig/k3s.yaml
      - K3S_KUBECONFIG_MODE=666
      # Pin a STABLE node name. Without this, k3s uses the container hostname
      # (a random container ID), so every recreate registers a NEW node and
      # leaves the old one as a "NotReady" ghost node in the datastore.
      - K3S_NODE_NAME=k3s-lab
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - kubeconfig:/kubeconfig
      # Route docker.io through the local pull-through cache (read at startup).
      - ./docker/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
    ports:
      - "${LAB_PORT:-8088}:8080"        # the app (shares this netns); override LAB_PORT if 8088 is taken
      - "${LAB_API_PORT:-6443}:6443"    # k8s API (optional, for host kubectl)
    healthcheck:
      test: ["CMD", "kubectl", "get", "nodes"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Pull-through cache of Docker Hub. k3s pulls docker.io images via this service
  # (see docker/registries.yaml): the first pull is fetched upstream and cached in
  # the registry-cache volume, every later pull is served locally — fast, offline,
  # immune to Docker Hub rate limits, and surviving a `make clean` of the cluster.
  # This is the ONLY container that talks to Docker Hub, so the DNS pin lives here
  # too (same override knobs as k3s).
  registry-cache:
    image: registry:2
    environment:
      - REGISTRY_PROXY_REMOTEURL=https://registry-1.docker.io
    dns:
      - ${LAB_DNS1:-1.1.1.1}
      - ${LAB_DNS2:-8.8.8.8}
    volumes:
      - registry-cache:/var/lib/registry

  # One-shot: warm the cache with the lab images at startup so the learner's very
  # first pod pull is served locally, not blocked on a flaky Docker Hub lookup
  # mid-lesson. Non-blocking (nothing waits on it) and idempotent (a per-image
  # marker in warm-state means only the first `up` downloads). Override the list
  # with LAB_IMAGES. See docker/warm-cache.sh.
  warm-cache:
    image: gcr.io/go-containerregistry/crane:debug
    depends_on:
      registry-cache:
        condition: service_started
    entrypoint: ["/busybox/sh", "/warm-cache.sh"]
    environment:
      - LAB_IMAGES=${LAB_IMAGES:-library/nginx:1.27 library/nginx:1.26 library/busybox:1.36}
    volumes:
      - ./docker/warm-cache.sh:/warm-cache.sh:ro
      - warm-state:/state

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: k8s
      POSTGRES_PASSWORD: k8s
      POSTGRES_DB: k8s_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k8s -d k8s_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    network_mode: "service:k3s"     # share the cluster node's network stack
    depends_on:
      k3s:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://k8s:k8s@postgres:5432/k8s_platform?sslmode=disable
    volumes:
      - kubeconfig:/kubeconfig:ro

volumes:
  k3s-data: {}
  kubeconfig: {}
  pgdata: {}
  registry-cache: {}
  warm-state: {}
